name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  schedule:
    - cron: "0 0 * * *"
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.6'
          - '1'
          - 'pre'
        os:
          - ubuntu-latest
        arch:
          - x64
        include:
          - version: '1'
            os: windows-latest
            arch: x64
          - version: '1'
            os: macOS-latest
            arch: x64
          - version: '1'
            os: macOS-latest
            arch: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - name: Diagnose figshare access (curl)
        if: runner.os == 'macOS'
        run: |
          echo "=== Runner egress IP ==="
          curl -s https://ifconfig.me || true
          echo ""
          echo "=== System architecture ==="
          uname -m
          echo "=== Testing figshare with curl ==="
          curl -sS -w "\nHTTP status: %{http_code}\n" -L -o /dev/null "https://ndownloader.figshare.com/files/53391239"
      - name: Diagnose figshare access (Julia)
        if: runner.os == 'macOS'
        shell: julia --color=yes {0}
        run: |
          url = "https://ndownloader.figshare.com/files/53391239"
          println("=== Testing Downloads.jl (libcurl) ===")
          try
              Downloads.download(url, tempname())
              println("SUCCESS")
          catch e
              println("FAILED: ", e)
          end
          import Pkg; Pkg.add("HTTP")
          using HTTP
          println("=== Testing HTTP.jl ===")
          try
              HTTP.download(url, tempname())
              println("SUCCESS")
          catch e
              println("FAILED: ", e)
          end
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          julia --project=docs -e '
            using Documenter: DocMeta, doctest
            using ArviZExampleData
            DocMeta.setdocmeta!(ArviZExampleData, :DocTestSetup, :(using ArviZExampleData); recursive=true)
            doctest(ArviZExampleData)'
